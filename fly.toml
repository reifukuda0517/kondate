app = "kondate-app"
primary_region = "nrt"

[build]

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/kondate.db"

[[mounts]]
  source = "kondate_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
